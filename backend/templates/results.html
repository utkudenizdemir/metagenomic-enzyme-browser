<!DOCTYPE html>
<html>
<head><title>Search Results</title></head>
<body>
    <h1>Results for "{{ query }}"</h1>
    <a href="/">← Back to home</a>

    {% if results %}
    <ul>
        {% for r in results %}
            <li><a href="/protein/{{ r[0] }}">{{ r[0] }}</a> – {{ r[3] }}</li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No results found.</p>
    {% endif %}
</body>
</html>
